<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Zero - Startup Directory</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Reset & CSS Variables */
        :root {
            --bg-color: #ffffff;
            --text-primary: #0a0a0a;
            --text-secondary: #444444;
            --text-muted: #777777;
            --accent-color: #000000;
            --border-color: #eaeaea;
            --font-sans: 'Plus Jakarta Sans', 'Sarabun', sans-serif;
            --font-display: 'Space Grotesk', 'Sarabun', sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 5rem 0;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 2.5rem;
            transition: var(--transition-smooth);
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
        }

        .back-btn:hover {
            color: var(--text-primary);
            border-bottom-color: var(--text-primary);
            transform: translateX(-3px);
        }

        /* Title Area */
        .page-header {
            margin-bottom: 3.5rem;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .page-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        .page-subtitle {
            font-size: 1.05rem;
            color: var(--text-secondary);
            max-width: 600px;
        }

        /* Filter Controls */
        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .filter-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
            border-radius: 0;
            font-family: var(--font-sans);
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--text-primary);
            color: var(--text-primary);
            background-color: #fcfcfc;
        }

        /* Startup Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .startup-card {
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            background: #ffffff;
            transition: var(--transition-smooth);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .startup-card:hover {
            border-color: var(--text-primary);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        .startup-card::after {
            content: '→';
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 1.25rem;
            color: var(--text-muted);
            opacity: 0;
            transform: translateX(-5px);
            transition: var(--transition-smooth);
        }

        .startup-card:hover::after {
            opacity: 1;
            transform: translateX(0);
            color: var(--text-primary);
        }

        /* Badge design */
        .badge-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .badge.stage-ideation {
            border-color: #eab308;
            color: #854d0e;
            background-color: #fef9c3;
        }

        .badge.stage-mvp {
            border-color: #3b82f6;
            color: #1e3a8a;
            background-color: #dbeafe;
        }

        .badge.category-green {
            border-color: #10b981;
            color: #064e3b;
            background-color: #d1fae5;
        }

        .badge.category-tech {
            border-color: #8b5cf6;
            color: #3b0764;
            background-color: #ede9fe;
        }

        .badge.category-marketing {
            border-color: #f97316;
            color: #7c2d12;
            background-color: #ffedd5;
        }

        .startup-name {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .startup-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            flex-grow: 1;
        }

        .startup-meta {
            border-top: 1px solid var(--border-color);
            padding-top: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .meta-seeking span {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Footer */
        footer {
            padding: 3rem 0;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: auto;
        }

        footer .container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .footer-left {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .footer-right {
            text-align: right;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .page-title {
                font-size: 2rem;
            }
            
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            main {
                padding: 3.5rem 0;
            }

            footer .container {
                flex-direction: column;
                gap: 1.5rem;
                align-items: flex-start;
            }

            .footer-right {
                text-align: left;
            }
        }
    </style>
</head>
<body>

    <main>
        <div class="container">
            <a href="index.html" class="back-btn">
                ← กลับหน้าหลัก
            </a>

            <div class="page-header">
                <h1 class="page-title">ทำเนียบทีมสตาร์ทอัพ</h1>
                <p class="page-subtitle">
                    รายชื่อโครงการสตาร์ทอัพและผลิตภัณฑ์เทคโนโลยีที่มีระบบนิเวศสนับสนุนการบ่มเพาะของ Garage Zero
                </p>
            </div>

            <div class="filters">
                <button class="filter-btn active" onclick="filterCategory('all')">ทั้งหมด</button>
                <button class="filter-btn" onclick="filterCategory('GreenTech')">GreenTech</button>
                <button class="filter-btn" onclick="filterCategory('MarTech')">MarTech</button>
                <button class="filter-btn" onclick="filterCategory('EdTech')">EdTech</button>
                <button class="filter-btn" onclick="filterCategory('HealthTech')">HealthTech</button>
            </div>

            <!-- Startup Grid -->
            <div class="cards-grid" id="startups-list">
                <!-- Cards generated dynamically from teams-data.js -->
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-left">
                <div>&copy; 2026 Garage Zero. All rights reserved.</div>
                <div>Designed for Silpakorn Startup Ecosystem</div>
            </div>
            <div class="footer-right">
                <div>ติดต่อ ผศ.ดร.จารุตม์ คุณานพดล (อ.จา)</div>
                <div>อีเมล kunanoppadol_j@su.ac.th</div>
                <div>เบอร์โทร 0818996377</div>
            </div>
        </div>
    </footer>

    <!-- Load shared teams database -->
    <script src="teams-data.js"></script>

    <!-- Filter & Dynamic Render Script -->
    <script>
        // Render startups dynamically from database on load
        document.addEventListener('DOMContentLoaded', () => {
            const listContainer = document.getElementById('startups-list');
            if (!listContainer || typeof teamsDatabase === 'undefined') return;

            listContainer.innerHTML = ''; // Clear container

            Object.keys(teamsDatabase).forEach(key => {
                const team = teamsDatabase[key];

                // Map category tag class
                let catClass = 'category-tech';
                if (team.category === 'GreenTech') catClass = 'category-green';
                else if (team.category === 'MarTech') catClass = 'category-marketing';

                // Map stage tag class
                let stageClass = 'stage-ideation';
                if (team.stage === 'MVP / Prototype' || team.stage === 'MVP') stageClass = 'stage-mvp';

                const cardHtml = `
                    <a href="team-detail.html?team=${key}" class="startup-card" data-category="${team.category}">
                        <div class="badge-row">
                            <span class="badge ${stageClass}">${team.stage}</span>
                            <span class="badge ${catClass}">${team.category}</span>
                        </div>
                        <h2 class="startup-name">${team.name}</h2>
                        <p class="startup-desc">${team.description}</p>
                        <div class="startup-meta">
                            <div class="meta-members">👥 สมาชิก ${team.members}</div>
                            <div class="meta-seeking">ต้องการ: <span>${team.seeking}</span></div>
                        </div>
                    </a>
                `;
                listContainer.insertAdjacentHTML('beforeend', cardHtml);
            });
        });

        function filterCategory(category) {
            // Update active state of buttons
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Filter cards
            const cards = document.querySelectorAll('#startups-list .startup-card');
            cards.forEach(card => {
                if (category === 'all') {
                    card.style.display = 'flex';
                } else {
                    const cardCat = card.getAttribute('data-category');
                    if (cardCat === category) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                }
            });
        }
    </script>
</body>
</html>
